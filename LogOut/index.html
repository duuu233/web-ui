<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <title>HIPPO管理中心</title>
  </head>
  <style>
    body,
    html {
      padding: 0;
      margin: 0;
    }
    .body-box {
      display: flex;
      /* justify-content: center; */
      align-items: center;
      flex-direction: column;
      width: 100vw;
      /* height: 100vh; */
      padding-top: 20vh;
    }
    h3 {
      font-size: 4vh;
    }

    .form-item {
      margin-bottom: 2vh;
      position: relative;
    }
    .icon {
      position: absolute;
      right: 10px;
      top: 1.2vh;
    }
    input {
      width: 40vh;
      font-size: 2vh;
      height: 4vh;
      padding-left: 12px;
    }
    .btn {
      height: 5vh;
      width: 10vh;
      /* margin-left: 8vh; */
      display: flex;
      align-items: center;
      cursor: pointer;
      justify-content: center;
      font-size: 2vh;
      background-color: #409eff;
      color: #fff;
      border-radius: 4px;
    }
  </style>

  <body>
    <div class="body-box">
      <h3>HIPPO注销页面</h3>
      <div class="form-item">
        <input placeholder="请输入用户邮箱" class="userEmail" type="text" />
      </div>
      <div class="form-item">
        <input placeholder="请输入用户密码" class="password" type="password" />
        <div class="icon">
          <svg
            class="svg-show"
            onclick="handlePassword()"
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 20 20"
          >
            <rect width="20" height="20" fill="none" />
            <g fill="currentColor">
              <path d="M10 12a2 2 0 1 0 0-4a2 2 0 0 0 0 4" />
              <path
                fill-rule="evenodd"
                d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10M14 10a4 4 0 1 1-8 0a4 4 0 0 1 8 0"
                clip-rule="evenodd"
              />
            </g>
          </svg>

          <svg
            class="svg-hide"
            onclick="handlePassword()"
            xmlns="http://www.w3.org/2000/svg"
            width="20px"
            height="20px"
            viewBox="0 0 24 24"
          >
            <rect width="24" height="24" fill="none" />
            <path
              fill="currentColor"
              d="M17.883 19.297A10.95 10.95 0 0 1 12 21c-5.392 0-9.878-3.88-10.818-9A11 11 0 0 1 4.52 5.935L1.394 2.808l1.414-1.414l19.799 19.798l-1.414 1.415zM5.936 7.35A8.97 8.97 0 0 0 3.223 12a9.005 9.005 0 0 0 13.201 5.838l-2.028-2.028A4.5 4.5 0 0 1 8.19 9.604zm6.978 6.978l-3.242-3.241a2.5 2.5 0 0 0 3.241 3.241m7.893 2.265l-1.431-1.431A8.9 8.9 0 0 0 20.778 12A9.005 9.005 0 0 0 9.552 5.338L7.974 3.76C9.221 3.27 10.58 3 12 3c5.392 0 9.878 3.88 10.819 9a10.95 10.95 0 0 1-2.012 4.593m-9.084-9.084Q11.86 7.5 12 7.5a4.5 4.5 0 0 1 4.492 4.778z"
            />
          </svg>
        </div>
      </div>
      <div class="btn" onclick="submit()">
        提 交
      </div>
    </div>
  </body>
  <script src="./axios.min.js"></script>
  <script src="./md5.js"></script>

  <script>
    let userEmail = document.querySelector('.userEmail')
    let password = document.querySelector('.password')
    let svgShow = document.querySelector('.svg-show')
    let svgHide = document.querySelector('.svg-hide')
    let passwordType
    svgHide.style.display = 'none'
    function submit() {
      if (!userEmail.value) {
        alert('用户邮箱不能为空')
        return
      }
      if (!password.value) {
        alert('用户密码不能为空')
        return
      }
      axios
        .post('https://zoneadmin.hippo-bot.com/Client/User/userOffPC', {
          userEmail: userEmail.value,
          password: md5(password.value)
        })
        .then(function(response) {
          console.log(response)
          if (response.status === 200) {
            if (response.data.retCode === 200) {
              alert('操作成功')
              userEmail.value = ''
              password.value = ''
            } else {
              alert(response.data.retMsg)
            }
          } else {
            alert('请求失败')
          }
        })
        .catch(function(error) {
          alert('请求失败')
          console.log(error)
        })
    }

    function handlePassword() {
      if (password.type == 'password') {
        password.type = 'type'
        svgShow.style.display = 'none'
        svgHide.style.display = 'inline-block'
      } else {
        password.type = 'password'
        svgShow.style.display = 'inline-block'
        svgHide.style.display = 'none'
      }
    }
  </script>
</html>
